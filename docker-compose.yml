services:
  mysql:
    image: mysql:8.4
    container_name: nexus-mysql
    restart: unless-stopped

    environment:
      # root 用于本地管理 MySQL 实例；业务服务不要直接使用 root。
      MYSQL_ROOT_PASSWORD: root
      # 官方镜像初始化时会创建 nexus 库，并创建 nexus/nexus 普通账号。
      # 该账号默认仅授予 nexus.* 权限，适合 control 作为业务读写账号使用。
      MYSQL_DATABASE: nexus
      MYSQL_USER: nexus
      MYSQL_PASSWORD: nexus
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./control/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: nexus-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --name=nexus-etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://127.0.0.1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://127.0.0.1:2380
      - --initial-cluster=nexus-etcd=http://127.0.0.1:2380
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ./data/etcd:/etcd-data
    healthcheck:
      test: [ "CMD", "etcdctl", "--endpoints=http://127.0.0.1:2379", "endpoint", "health" ]
      interval: 10s
      timeout: 5s
      retries: 10
