http:
  addr: ":8080"
  advertiseAddr: "127.0.0.1:8080"

service:
  version: "dev"

mysql:
  host: "127.0.0.1"
  port: 3306
  database: "nexus"
  username: "nexus"
  password: "nexus"
  charset: "utf8mb4"
  maxOpenConns: 10
  maxIdleConns: 5
  connMaxLifetime: "30m"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  dialTimeout: "3s"
  readTimeout: "3s"
  writeTimeout: "3s"

recommend:
  positiveFeedbackTypes:
    - "like"
    - "star"
  readFeedbackTypes:
    - "read"

etcd:
  endpoints:
    - 127.0.0.1:2379
  username: ""
  password: ""
  dialTimeout: 5s
  requestTimeout: 3s
  keyPrefix: /nexus/meta
  leaseTTL: 10
