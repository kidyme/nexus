openapi: 3.0.3
info:
  title: Nexus Control Node API
  version: "0.1.0"
  description: control 服务暴露的节点查询接口。
tags:
  - name: node
    description: 节点查询接口
paths:
  /api/meta/nodes:
    get:
      operationId: listNodes
      tags:
        - node
      summary: 查询节点列表
      parameters:
        - name: service
          in: query
          required: false
          description: 可选的服务名过滤条件，例如 control、offline、online。
          schema:
            type: string
      responses:
        "200":
          description: 节点列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeListResponse"
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/meta/nodes/{node_id}:
    get:
      operationId: getNode
      tags:
        - node
      summary: 查询节点详情
      parameters:
        - name: node_id
          in: path
          required: true
          description: 全局唯一节点 ID。
          schema:
            type: string
      responses:
        "200":
          description: 节点详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetailResponse"
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 节点不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Node:
      type: object
      required:
        - node_id
        - service_name
        - endpoint
        - status
        - version
        - heartbeat_at
      properties:
        node_id:
          type: string
          description: 全局唯一节点标识。
        service_name:
          type: string
          description: 节点所属服务名。
        endpoint:
          type: string
          description: 节点访问地址。
        status:
          type: string
          description: 节点状态。
        version:
          type: string
          description: 节点运行版本。
        heartbeat_at:
          type: string
          format: date-time
          description: 最近一次 UTC 心跳时间。
    ErrorResponse:
      type: object
      required:
        - errno
        - msg
      properties:
        errno:
          type: integer
          description: 错误码。
        msg:
          type: string
          description: 错误信息。
        trace_id:
          type: string
          description: 请求 trace id。
    NodeListResponse:
      type: object
      required:
        - errno
        - msg
        - data
      properties:
        errno:
          type: integer
          description: 错误码，0 表示成功。
        msg:
          type: string
          description: 响应消息。
        data:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        trace_id:
          type: string
          description: 请求 trace id。
    NodeDetailResponse:
      type: object
      required:
        - errno
        - msg
        - data
      properties:
        errno:
          type: integer
          description: 错误码，0 表示成功。
        msg:
          type: string
          description: 响应消息。
        data:
          $ref: "#/components/schemas/Node"
        trace_id:
          type: string
          description: 请求 trace id。
