openapi: 3.0.3
info:
  title: Nexus Control Common API
  version: "0.1.0"
  description: control 服务暴露的通用 HTTP 接口。
paths:
  /healthz:
    get:
      operationId: healthz
      summary: 健康检查
      responses:
        "200":
          description: 服务健康状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  schemas:
    HealthData:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: 健康状态。
    HealthResponse:
      type: object
      required:
        - errno
        - msg
        - data
      properties:
        errno:
          type: integer
          description: 错误码，0 表示成功。
        msg:
          type: string
          description: 响应消息。
        data:
          $ref: "#/components/schemas/HealthData"
        trace_id:
          type: string
          description: 请求 trace id。
