openapi: 3.0.3
info:
  title: Nexus Control User API
  version: "0.1.0"
  description: control 服务暴露的用户管理接口。
tags:
  - name: user
    description: 用户管理接口
paths:
  /api/users:
    get:
      operationId: listUsers
      tags:
        - user
      summary: 查询用户列表
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          example: 20
      responses:
        "200":
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPageResponse"
              examples:
                pagedUsers:
                  summary: 分页查询用户列表示例
                  value:
                    errno: 0
                    msg: ok
                    data:
                      list:
                        - user_id: "u-100"
                          labels:
                            vip: true
                            region: "cn"
                          comment: "high value user"
                        - user_id: "u-101"
                          labels:
                            vip: false
                          comment: "new user"
                      page: 1
                      size: 20
                      total: 135
                    trace_id: "trace-user-list-001"
        "500":
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUsers
      tags:
        - user
      summary: 创建用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUsersRequestBody"
            examples:
              singleCreate:
                summary: 单条创建用户
                value:
                  user_id: "u-100"
                  labels:
                    vip: true
                    region: "cn"
                  comment: "high value user"
              batchCreate:
                summary: 批量创建用户
                value:
                  - user_id: "u-100"
                    labels:
                      vip: true
                      region: "cn"
                    comment: "high value user"
                  - user_id: "u-101"
                    labels:
                      vip: false
                    comment: "new user"
      responses:
        "201":
          description: 用户创建结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUsersResponse"
              examples:
                singleCreateResult:
                  summary: 单条创建返回单个对象
                  value:
                    errno: 0
                    msg: ok
                    data:
                      user_id: "u-100"
                      labels:
                        vip: true
                        region: "cn"
                      comment: "high value user"
                    trace_id: "trace-user-create-001"
                batchCreateResult:
                  summary: 批量创建返回对象数组
                  value:
                    errno: 0
                    msg: ok
                    data:
                      - user_id: "u-100"
                        labels:
                          vip: true
                          region: "cn"
                        comment: "high value user"
                      - user_id: "u-101"
                        labels:
                          vip: false
                        comment: "new user"
                    trace_id: "trace-user-create-002"
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchUsers
      tags:
        - user
      summary: 批量更新用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUsersRequestBody"
            examples:
              batchPatch:
                summary: 批量更新用户
                value:
                  - user_id: "u-100"
                    comment: "upgraded vip"
                  - user_id: "u-101"
                    labels:
                      vip: true
                      source: "campaign-a"
      responses:
        "200":
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
              examples:
                batchPatchResult:
                  summary: 批量更新后的用户列表
                  value:
                    errno: 0
                    msg: ok
                    data:
                      - user_id: "u-100"
                        labels:
                          vip: true
                          region: "cn"
                        comment: "upgraded vip"
                      - user_id: "u-101"
                        labels:
                          vip: true
                          source: "campaign-a"
                        comment: "new user"
                    trace_id: "trace-user-patch-001"
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUsers
      tags:
        - user
      summary: 批量删除用户
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteUsersRequestBody"
            examples:
              batchDelete:
                summary: 批量删除用户
                value:
                  - "u-100"
                  - "u-101"
      responses:
        "204":
          description: 删除成功
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/users/{user_id}:
    get:
      operationId: getUser
      tags:
        - user
      summary: 查询用户详情
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "u-100"
      responses:
        "200":
          description: 用户详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
              examples:
                userDetail:
                  summary: 单个用户详情
                  value:
                    errno: 0
                    msg: ok
                    data:
                      user_id: "u-100"
                      labels:
                        vip: true
                        region: "cn"
                      comment: "high value user"
                    trace_id: "trace-user-detail-001"
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchUser
      tags:
        - user
      summary: 部分更新用户
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "u-100"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserRequest"
            examples:
              patchComment:
                summary: 只更新备注
                value:
                  comment: "reactivated user"
              patchLabels:
                summary: 只更新标签
                value:
                  labels:
                    vip: true
                    tier: "gold"
      responses:
        "200":
          description: 用户详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetailResponse"
              examples:
                patchUserResult:
                  summary: 更新后的用户详情
                  value:
                    errno: 0
                    msg: ok
                    data:
                      user_id: "u-100"
                      labels:
                        vip: true
                        tier: "gold"
                      comment: "reactivated user"
                    trace_id: "trace-user-patch-002"
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags:
        - user
      summary: 删除用户
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
          example: "u-100"
      responses:
        "204":
          description: 删除成功
        "400":
          description: 非法请求
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    User:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          description: 用户唯一标识。
        labels:
          type: object
          additionalProperties: true
          description: 用户标签。
        comment:
          type: string
          description: 用户备注。
    CreateUserRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
        labels:
          type: object
          additionalProperties: true
        comment:
          type: string
    CreateUsersRequestBody:
      oneOf:
        - $ref: "#/components/schemas/CreateUserRequest"
        - type: array
          items:
            $ref: "#/components/schemas/CreateUserRequest"
    CreateUsersResponse:
      oneOf:
        - $ref: "#/components/schemas/UserDetailResponse"
        - $ref: "#/components/schemas/UserListResponse"
    PatchUserRequest:
      type: object
      properties:
        labels:
          type: object
          additionalProperties: true
        comment:
          type: string
    PatchUserBatchItem:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
        labels:
          type: object
          additionalProperties: true
        comment:
          type: string
    PatchUsersRequestBody:
      type: array
      items:
        $ref: "#/components/schemas/PatchUserBatchItem"
    DeleteUsersRequestBody:
      type: array
      items:
        type: string
    ErrorResponse:
      type: object
      required:
        - errno
        - msg
        - data
        - trace_id
      properties:
        errno:
          type: integer
        msg:
          type: string
        data:
          nullable: true
        trace_id:
          type: string
    UserListResponse:
      type: object
      required:
        - errno
        - msg
        - data
        - trace_id
      properties:
        errno:
          type: integer
        msg:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        trace_id:
          type: string
    UserPageData:
      type: object
      required:
        - list
        - page
        - size
        - total
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/User"
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
          format: int64
    UserPageResponse:
      type: object
      required:
        - errno
        - msg
        - data
        - trace_id
      properties:
        errno:
          type: integer
        msg:
          type: string
        data:
          $ref: "#/components/schemas/UserPageData"
        trace_id:
          type: string
    UserDetailResponse:
      type: object
      required:
        - errno
        - msg
        - data
        - trace_id
      properties:
        errno:
          type: integer
        msg:
          type: string
        data:
          $ref: "#/components/schemas/User"
        trace_id:
          type: string
